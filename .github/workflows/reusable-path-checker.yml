name: Reusable path checker

on:
  workflow_call:
    inputs:
      target-paths:
        description: >-
          Newline-separated list of extended regex patterns to match against
          changed file paths. If any changed file matches any pattern, the
          output will be 'true'.
        required: true
        type: string
      base-sha:
        description: "Base commit SHA for the diff"
        required: true
        type: string
      head-sha:
        description: "Head commit SHA for the diff"
        required: true
        type: string
    outputs:
      should_run:
        description: "Whether any changed files match the target paths"
        value: ${{ jobs.check.outputs.should_run }}

jobs:
  check:
    name: Check paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.diff.outputs.should_run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          disable-sudo-and-containers: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: diff
        env:
          TARGET_PATHS: ${{ inputs.target-paths }}
          BASE_SHA: ${{ inputs.base-sha }}
          HEAD_SHA: ${{ inputs.head-sha }}
        run: |
          echo "Changed files:"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA"
          echo ""

          # Write patterns to a file (one per line), filtering blanks
          echo "$TARGET_PATHS" | grep -v '^\s*$' > /tmp/patterns.txt
          echo "Patterns:"
          cat /tmp/patterns.txt
          echo ""

          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qEf /tmp/patterns.txt; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Result: relevant changes found"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Result: no relevant changes"
          fi
