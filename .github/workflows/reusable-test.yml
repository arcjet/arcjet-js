name: Reusable test workflow

on:
  workflow_call: {}

env:
  DO_NOT_TRACK: "1"
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  bun-test:
    name: Bun
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          allowed-endpoints: >
            api.github.com:443
            decide.arcjet.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
          disable-sudo-and-containers: true
          egress-policy: block
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: 1.2.19
      - run: bun install && bun run build
      - run: bun test
        working-directory: arcjet-bun
  deno-test:
    name: Deno
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          allowed-endpoints: >
            api.github.com:443
            decide.arcjet.com:443
            deno.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
          disable-sudo-and-containers: true
          egress-policy: block
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.4.2
      - run: npm ci && npm run build
      - run: deno test test/**/*.test.ts --allow-env --allow-net --no-check
        working-directory: arcjet-deno
  node-test:
    name: "Run tests (OS: ${{matrix.os}}, Node: ${{ matrix.node }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24
          - 26
        os: [ubuntu-latest]
    permissions:
      contents: read
    steps:
      # Environment security
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            decide.arcjet.com:443
            github.com:443
            nodejs.org:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443

      # Checkout
      # Most toolchains require checkout first
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Language toolchains
      - name: Install Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node }}

      # Workflow

      - name: Install dependencies
        run: npm ci && npm run build

      - name: Run tests
        run: npm test

  transport-runtime:
    name: "@arcjet/transport proxy (${{ matrix.runtime }} ${{ matrix.bun-version || matrix.deno-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Bun's native-fetch proxy support is exercised here (not under Node).
          # 1.3.0 does not honor the proxy env vars in `fetch`; 1.3.14 is the
          # version verified to work.
          - runtime: bun
            script: test-runtime-bun
            bun-version: 1.3.14
          - runtime: bun
            script: test-runtime-bun
            bun-version: latest
          - runtime: deno
            script: test-runtime-deno
            deno-version: lts
          - runtime: deno
            script: test-runtime-deno
            deno-version: latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          allowed-endpoints: >
            api.github.com:443
            deno.com:443
            dl.deno.land:443
            github.com:443
            nodejs.org:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
          disable-sudo-and-containers: true
          egress-policy: block
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        if: matrix.runtime == 'bun'
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        if: matrix.runtime == 'deno'
        with:
          deno-version: ${{ matrix.deno-version }}
      # Build the whole workspace first so `@arcjet/transport`'s dependencies
      # (`@arcjet/env`, `@arcjet/logger`) are available to the runtime test.
      - run: npm ci && npm run build
      - run: npm run ${{ matrix.script }} --workspace=@arcjet/transport
