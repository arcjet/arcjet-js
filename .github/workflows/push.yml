name: Push

on:
  push:
    # Only ever run `push` events against protected branches, likely just `main`
    branches:
      - main
      - release-please--branches--main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/reusable-lint.yml
    permissions:
      contents: read

  test:
    name: Run tests
    uses: ./.github/workflows/reusable-test.yml
    permissions:
      contents: read

  examples:
    name: Build examples
    uses: ./.github/workflows/reusable-examples.yml
    permissions:
      contents: read

  release:
    runs-on: ubuntu-latest
    # Only run Release Please on `main`. It pushes to
    # `release-please--branches--main` using a GitHub App token, and App token
    # pushes (unlike `GITHUB_TOKEN`) re-trigger workflows — so running this job
    # on that branch makes it force-push and re-trigger itself in an infinite
    # loop. The `test` and `examples` jobs still run on the release branch.
    if: github.ref == 'refs/heads/main'
    # Release Please is very fast, so we set a tiny timeout
    timeout-minutes: 2
    # The GitHub App token handles write permissions for contents and
    # pull-requests, so this job only needs minimal GITHUB_TOKEN permissions.
    permissions:
      contents: read
    steps:
      # Environment security
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo-and-containers: true
          egress-policy: audit

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
