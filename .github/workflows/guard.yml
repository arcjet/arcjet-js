name: Guard

on:
  push:
    branches:
      - main
      - release-please--branches--main
    paths:
      - arcjet-guard/**
      - .github/workflows/guard.yml
  pull_request:
    paths:
      - arcjet-guard/**
      - .github/workflows/guard.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: "1"

defaults:
  run:
    working-directory: arcjet-guard

jobs:
  build:
    name: "Build & Unit Test (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo-and-containers: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node }}

      - name: Pin npm
        uses: ./.github/actions/pin-npm

      - name: Install dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      # Build the whole workspace so @arcjet/guard's workspace dependencies
      # (e.g. @arcjet/analyze) have their `dist/` output for guard's
      # source tests and type checking.
      - name: Build
        run: npm run build
        working-directory: ${{ github.workspace }}

      - name: Unit tests (with coverage)
        run: npm run test-unit

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo-and-containers: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Pin npm
        uses: ./.github/actions/pin-npm

      - name: Install dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      # Build the whole workspace so @arcjet/guard's workspace dependencies
      # (e.g. @arcjet/analyze) have their `dist/` output for guard's
      # source tests and type checking.
      - name: Build
        run: npm run build
        working-directory: ${{ github.workspace }}

      - name: Lint (oxlint)
        run: npm run lint

      - name: Type check (tsgo)
        run: npm run typecheck

  runtime:
    name: "Runtime (${{ matrix.runtime }}${{ matrix.node-version && format(' node{0}', matrix.node-version) || matrix.deno-version && format(' {0}', matrix.deno-version) || matrix.bun-version && format(' {0}', matrix.bun-version) || '' }})"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node
            script: test-runtime-node
            node-version: 22
          - runtime: node
            script: test-runtime-node
            node-version: 24
          - runtime: node
            script: test-runtime-node
            node-version: 26
          - runtime: fetch
            script: test-runtime-fetch
            node-version: 22
          - runtime: fetch
            script: test-runtime-fetch
            node-version: 24
          - runtime: fetch
            script: test-runtime-fetch
            node-version: 26
          - runtime: cloudflare
            script: test-runtime-cloudflare
          - runtime: bun
            script: test-runtime-bun
            bun-version: 1.3.0
          - runtime: bun
            script: test-runtime-bun
            bun-version: latest
          - runtime: deno
            script: test-runtime-deno
            deno-version: lts
          - runtime: deno
            script: test-runtime-deno
            deno-version: latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo-and-containers: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version || '24' }}

      - name: Pin npm
        uses: ./.github/actions/pin-npm

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: Install dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      # Build the whole workspace so guard's workspace dependencies are
      # available to the runtime tests.
      - name: Build
        run: npm run build
        working-directory: ${{ github.workspace }}

      - name: Runtime test (${{ matrix.runtime }})
        run: npm run ${{ matrix.script }}
